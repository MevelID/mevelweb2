<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video - UniteMevel</title>
  <link rel="stylesheet" href="UniteMevelD.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Navigasi utama">
      <a class="brand" href="index.html">
        <span class="brand-name">UniteMevel</span>
      </a>

      <ul class="nav-links">
        <li><a href="galeri.html">Galeri</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="Kontak.html">Kontak</a></li>
        <li><a href="index.html">Beranda</a></li>
      </ul>
    </nav>
  </header>

  <main class="video-page">
    <header class="video-hero">
      <p class="hero-label">Video</p>
      <h1>Video</h1>
      <p>Random</p>
    </header>

    <div class="video-list" id="video-list" aria-label="Daftar video">
      <article class="video-card" data-video-id="masha">
        <video controls preload="none" data-video-src="asetvideo/masha the best girl actually.mp4">
          <source type="video/mp4">
          Browser kamu tidak mendukung pemutar video.
        </video>
        <p class="video-description">Kalah</p>
        <div class="video-actions">
          <button class="love-button" type="button" aria-label="Love video">
            <img src="asetvideo/love.png" alt="">
            <span>0</span>
          </button>
          <button class="open-comment-button" type="button">Kirim Komentar</button>
        </div>
        <div class="comment-list" aria-label="Komentar"></div>
      </article>

      <article class="video-card" data-video-id="keqing">
        <video controls preload="none" data-video-src="asetvideo/dont leave me keqing.mp4">
          <source type="video/mp4">
          Browser kamu tidak mendukung pemutar video.
        </video>
        <p class="video-description">First B5</p>
        <div class="video-actions">
          <button class="love-button" type="button" aria-label="Love video">
            <img src="asetvideo/love.png" alt="">
            <span>0</span>
          </button>
          <button class="open-comment-button" type="button">Kirim Komentar</button>
        </div>
        <div class="comment-list" aria-label="Komentar"></div>
      </article>

      <article class="video-card" data-video-id="alya">
        <video controls preload="none" data-video-src="asetvideo/im in love alya.mp4">
          <source type="video/mp4">
          Browser kamu tidak mendukung pemutar video.
        </video>
        <p class="video-description">Nah ini</p>
        <div class="video-actions">
          <button class="love-button" type="button" aria-label="Love video">
            <img src="asetvideo/love.png" alt="">
            <span>0</span>
          </button>
          <button class="open-comment-button" type="button">Kirim Komentar</button>
        </div>
        <div class="comment-list" aria-label="Komentar"></div>
      </article>

      <article class="video-card" data-video-id="mahiru">
        <video controls preload="none" data-video-src="asetvideo/mahiru shiina.mp4">
          <source type="video/mp4">
          Browser kamu tidak mendukung pemutar video.
        </video>
        <p class="video-description">Mimpi basah wni</p>
        <div class="video-actions">
          <button class="love-button" type="button" aria-label="Love video">
            <img src="asetvideo/love.png" alt="">
            <span>0</span>
          </button>
          <button class="open-comment-button" type="button">Kirim Komentar</button>
        </div>
        <div class="comment-list" aria-label="Komentar"></div>
      </article>
    </div>
  </main>

  <button class="open-video-submit-button" type="button" aria-label="Up Video">+</button>

  <div class="video-submit-modal" id="video-submit-modal" aria-hidden="true">
    <div class="video-submit-panel" role="dialog" aria-modal="true" aria-labelledby="video-submit-title">
      <div class="comment-modal-header">
        <h2 id="video-submit-title">Up Video</h2>
        <button class="close-video-submit-modal" type="button" aria-label="Tutup">X</button>
      </div>

      <form class="video-submit-form" id="video-submit-form">
        <input type="text" name="submittedBy" placeholder="Nama kamu" autocomplete="name" required>
        <input type="text" name="title" placeholder="Judul video" required>
        <input type="url" name="youtubeUrl" placeholder="Link YouTube" required>
        <textarea name="description" placeholder="Deskripsi singkat" rows="3" required></textarea>
        <button type="submit">Send for Review</button>
        <p class="video-submit-status" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <div class="comment-modal" id="comment-modal" aria-hidden="true">
    <div class="comment-modal-panel" role="dialog" aria-modal="true" aria-labelledby="comment-modal-title">
      <div class="comment-modal-header">
        <h2 id="comment-modal-title">Kirim Komentar</h2>
        <button class="close-comment-modal" type="button" aria-label="Tutup">X</button>
      </div>

      <form class="comment-form">
        <input type="text" name="username" placeholder="Username" autocomplete="name" required>
        <textarea name="comment" placeholder="Tulis komentar" rows="4" required></textarea>
        <button type="submit">Kirim Komentar</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      addDoc,
      collection,
      doc,
      getDoc,
      getFirestore,
      onSnapshot,
      query,
      runTransaction,
      serverTimestamp,
      where
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0Um0HAdJmY61q7X0wOjtC_SvoA-7zsiU",
      authDomain: "mevelweb.firebaseapp.com",
      projectId: "mevelweb",
      storageBucket: "mevelweb.firebasestorage.app",
      messagingSenderId: "687837335053",
      appId: "1:687837335053:web:0d2fc0539791ea5cd38f44",
      measurementId: "G-E9GLEXRGZG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const commentsCollection = collection(db, "comments");
    const reactionsCollection = collection(db, "videoReactions");
    const videosCollection = collection(db, "videos");

    const videos = document.querySelectorAll(".video-card video");

    function loadVideo(video) {
      const source = video.querySelector("source");

      if (!source.src) {
        source.src = video.dataset.videoSrc;
        video.load();
      }
    }

    function unloadVideo(video) {
      const source = video.querySelector("source");

      if (source.src) {
        video.pause();
        source.removeAttribute("src");
        video.load();
      }
    }

    videos.forEach((currentVideo) => {
      currentVideo.addEventListener("pointerdown", () => {
        loadVideo(currentVideo);
      });

      currentVideo.addEventListener("keydown", () => {
        loadVideo(currentVideo);
      });

      currentVideo.addEventListener("play", () => {
        loadVideo(currentVideo);

        videos.forEach((otherVideo) => {
          if (otherVideo !== currentVideo) {
            unloadVideo(otherVideo);
          }
        });
      });
    });

    const videoList = document.getElementById("video-list");
    const openVideoSubmitButton = document.querySelector(".open-video-submit-button");
    const videoSubmitModal = document.getElementById("video-submit-modal");
    const videoSubmitForm = document.getElementById("video-submit-form");
    const videoSubmitStatus = videoSubmitForm.querySelector(".video-submit-status");
    const closeVideoSubmitModal = videoSubmitModal.querySelector(".close-video-submit-modal");
    const initializedVideoIds = new Set();

    function getVideoData(videoId) {
      const savedData = localStorage.getItem(`unitemevel-video-${videoId}`);
      return savedData ? JSON.parse(savedData) : { loved: false, loves: 0 };
    }

    function saveVideoData(videoId, data) {
      localStorage.setItem(`unitemevel-video-${videoId}`, JSON.stringify(data));
    }

    const commentModal = document.getElementById("comment-modal");
    const commentForm = commentModal.querySelector(".comment-form");
    const closeCommentModal = commentModal.querySelector(".close-comment-modal");
    let activeVideo = null;

    function openCommentModal(video) {
      activeVideo = video;
      commentModal.classList.add("is-open");
      commentModal.setAttribute("aria-hidden", "false");
      commentForm.username.focus();
    }

    function closeModal() {
      commentModal.classList.remove("is-open");
      commentModal.setAttribute("aria-hidden", "true");
      commentForm.reset();
      activeVideo = null;
    }

    function openVideoSubmit() {
      videoSubmitStatus.textContent = "";
      videoSubmitModal.classList.add("is-open");
      videoSubmitModal.setAttribute("aria-hidden", "false");
      videoSubmitForm.submittedBy.focus();
    }

    function closeVideoSubmit() {
      videoSubmitModal.classList.remove("is-open");
      videoSubmitModal.setAttribute("aria-hidden", "true");
      videoSubmitForm.reset();
      videoSubmitStatus.textContent = "";
    }

    function renderCommentStatus(commentList, message) {
      commentList.innerHTML = "";

      const status = document.createElement("p");
      status.className = "empty-comments";
      status.textContent = message;
      commentList.appendChild(status);
    }

    function formatRelativeTime(date) {
      if (!date) {
        return "baru saja";
      }

      const diffInSeconds = Math.max(0, Math.floor((Date.now() - date.getTime()) / 1000));
      const diffInMinutes = Math.floor(diffInSeconds / 60);
      const diffInHours = Math.floor(diffInMinutes / 60);
      const diffInDays = Math.floor(diffInHours / 24);

      if (diffInSeconds < 60) {
        return "baru saja";
      }

      if (diffInMinutes < 60) {
        return `${diffInMinutes}m ago`;
      }

      if (diffInHours < 24) {
        return `${diffInHours}h ago`;
      }

      if (diffInDays === 1) {
        return "today";
      }

      if (diffInDays < 7) {
        return `${diffInDays}D ago`;
      }

      return date.toLocaleDateString("id-ID", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    function renderComments(commentList, comments, expanded = false) {
      commentList.innerHTML = "";

      if (comments.length === 0) {
        commentList.innerHTML = '<p class="empty-comments">Belum ada komentar.</p>';
        return;
      }

      const visibleComments = expanded ? comments : comments.slice(0, 2);

      visibleComments.forEach((comment) => {
        const commentItem = document.createElement("div");
        commentItem.className = "comment-item";
        commentItem.innerHTML = `
          <div class="comment-meta">
            <strong></strong>
            <span></span>
          </div>
          <p></p>
        `;
        commentItem.querySelector("strong").textContent = comment.username;
        commentItem.querySelector("span").textContent = formatRelativeTime(comment.createdAt);
        commentItem.querySelector("p").textContent = comment.text;
        commentList.appendChild(commentItem);
      });

      if (comments.length > 2) {
        const expandButton = document.createElement("button");
        expandButton.className = "expand-comments-button";
        expandButton.type = "button";
        expandButton.textContent = expanded ? "Sembunyikan komentar" : `Lihat ${comments.length - 2} komentar lainnya`;
        expandButton.addEventListener("click", () => {
          renderComments(commentList, comments, !expanded);
        });
        commentList.appendChild(expandButton);
      }
    }

    function extractYouTubeId(url) {
      try {
        const parsedUrl = new URL(url);

        if (parsedUrl.hostname.includes("youtu.be")) {
          return parsedUrl.pathname.split("/").filter(Boolean)[0] || "";
        }

        if (parsedUrl.searchParams.has("v")) {
          return parsedUrl.searchParams.get("v");
        }

        const pathParts = parsedUrl.pathname.split("/").filter(Boolean);
        const embedLikeIndex = pathParts.findIndex((part) => ["embed", "shorts", "live"].includes(part));

        if (embedLikeIndex >= 0) {
          return pathParts[embedLikeIndex + 1] || "";
        }
      } catch (error) {
        const match = url.match(/(?:youtu\.be\/|v=|embed\/|shorts\/|live\/)([a-zA-Z0-9_-]{11})/);
        return match ? match[1] : "";
      }

      return "";
    }

    function createYoutubeVideoCard(videoId, video) {
      const videoCard = document.createElement("article");
      videoCard.className = "video-card";
      videoCard.dataset.videoId = videoId;
      videoCard.dataset.dynamicVideo = "true";
      videoCard.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${video.youtubeId}"
          title=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
        <p class="video-description"></p>
        <div class="video-actions">
          <button class="love-button" type="button" aria-label="Love video">
            <img src="asetvideo/love.png" alt="">
            <span>0</span>
          </button>
          <button class="open-comment-button" type="button">Kirim Komentar</button>
        </div>
        <div class="comment-list" aria-label="Komentar"></div>
      `;
      videoCard.querySelector("iframe").title = video.title || "Video YouTube";
      videoCard.querySelector(".video-description").textContent = video.description || video.title || "Video kiriman";
      return videoCard;
    }

    function initializeVideoCard(videoCard) {
      const videoId = videoCard.dataset.videoId;

      if (initializedVideoIds.has(videoId)) {
        return;
      }

      initializedVideoIds.add(videoId);

      const loveButton = videoCard.querySelector(".love-button");
      const loveCount = loveButton.querySelector("span");
      const openCommentButton = videoCard.querySelector(".open-comment-button");
      const commentList = videoCard.querySelector(".comment-list");
      const data = getVideoData(videoId);
      const reactionDoc = doc(reactionsCollection, videoId);
      let latestComments = null;

      function renderVideoData() {
        loveCount.textContent = data.loves;
        loveButton.classList.toggle("is-loved", data.loved);

        if (!latestComments) {
          renderCommentStatus(commentList, "Memuat komentar...");
          return;
        }

        renderComments(commentList, latestComments);
      }

      function applyReactionData(reactionData) {
        data.loves = Math.max(0, Number(reactionData?.loves || 0));
        saveVideoData(videoId, data);
        renderVideoData();
      }

      loveButton.addEventListener("click", async () => {
        const loveChange = data.loved ? -1 : 1;

        data.loved = !data.loved;
        data.loves = Math.max(0, data.loves + loveChange);
        saveVideoData(videoId, data);
        renderVideoData();

        loveButton.disabled = true;

        try {
          await runTransaction(db, async (transaction) => {
            const reactionSnapshot = await transaction.get(reactionDoc);
            const currentLoves = Number(reactionSnapshot.data()?.loves || 0);
            const nextLoves = Math.max(0, currentLoves + loveChange);

            transaction.set(reactionDoc, { loves: nextLoves }, { merge: true });
          });
        } catch (error) {
          console.error("Love gagal disimpan:", error);
          data.loved = !data.loved;
          data.loves = Math.max(0, data.loves - loveChange);
          saveVideoData(videoId, data);
          renderVideoData();
          alert("Love gagal disimpan. Coba lagi nanti.");
        } finally {
          loveButton.disabled = false;
        }
      });

      openCommentButton.addEventListener("click", () => {
        openCommentModal({ videoId });
      });

      renderVideoData();

      const commentsQuery = query(
        commentsCollection,
        where("videoId", "==", videoId)
      );

      onSnapshot(
        commentsQuery,
        (snapshot) => {
          latestComments = snapshot.docs
            .map((doc) => {
              const comment = doc.data();
              return {
                username: comment.username || "Anonim",
                text: comment.text || "",
                createdAt: comment.createdAt?.toDate ? comment.createdAt.toDate() : null
              };
            })
            .sort((firstComment, secondComment) => {
              const firstTime = firstComment.createdAt?.getTime() || 0;
              const secondTime = secondComment.createdAt?.getTime() || 0;
              return secondTime - firstTime;
            });

          renderVideoData();
        },
        () => {
          renderCommentStatus(commentList, "Komentar belum bisa dimuat.");
        }
      );

      onSnapshot(
        reactionDoc,
        (snapshot) => {
          applyReactionData(snapshot.data());
        },
        (error) => {
          console.error("Love gagal dimuat:", error);
        }
      );

      getDoc(reactionDoc)
        .then((snapshot) => {
          applyReactionData(snapshot.data());
        })
        .catch((error) => {
          console.error("Love awal gagal dimuat:", error);
        });

      window.setInterval(renderVideoData, 60000);
    }

    document.querySelectorAll(".video-card").forEach(initializeVideoCard);

    const approvedVideosQuery = query(
      videosCollection,
      where("status", "==", "approved")
    );

    onSnapshot(
      approvedVideosQuery,
      (snapshot) => {
        snapshot.docs.forEach((videoDoc) => {
          const videoId = `youtube-${videoDoc.id}`;

          if (initializedVideoIds.has(videoId)) {
            return;
          }

          const video = videoDoc.data();

          if (!video.youtubeId) {
            return;
          }

          const videoCard = createYoutubeVideoCard(videoId, video);
          videoList.appendChild(videoCard);
          initializeVideoCard(videoCard);
        });
      },
      (error) => {
        console.error("Video approved gagal dimuat:", error);
      }
    );

    videoSubmitForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const submittedBy = videoSubmitForm.submittedBy.value.trim();
      const title = videoSubmitForm.title.value.trim();
      const youtubeUrl = videoSubmitForm.youtubeUrl.value.trim();
      const description = videoSubmitForm.description.value.trim();
      const youtubeId = extractYouTubeId(youtubeUrl);
      const submitButton = videoSubmitForm.querySelector('button[type="submit"]');

      if (!youtubeId) {
        videoSubmitStatus.textContent = "Link YouTube belum valid.";
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Mengirim...";
      videoSubmitStatus.textContent = "";

      try {
        await addDoc(videosCollection, {
          submittedBy,
          title,
          youtubeUrl,
          youtubeId,
          description,
          status: "pending",
          createdAt: serverTimestamp()
        });

        videoSubmitForm.reset();
        videoSubmitStatus.textContent = "Video terkirim. Tunggu dicek dulu ya.";
        window.setTimeout(closeVideoSubmit, 1200);
      } catch (error) {
        console.error("Video gagal dikirim:", error);
        videoSubmitStatus.textContent = "Video gagal dikirim. Coba lagi nanti.";
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Kirim untuk Dicek";
      }
    });

    openVideoSubmitButton.addEventListener("click", openVideoSubmit);
    closeVideoSubmitModal.addEventListener("click", closeVideoSubmit);

    videoSubmitModal.addEventListener("click", (event) => {
      if (event.target === videoSubmitModal) {
        closeVideoSubmit();
      }
    });

    commentForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!activeVideo) {
        return;
      }

      const username = commentForm.username.value.trim();
      const text = commentForm.comment.value.trim();

      if (!username || !text) {
        return;
      }

      const submitButton = commentForm.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = "Mengirim...";

      try {
        await addDoc(commentsCollection, {
          videoId: activeVideo.videoId,
          username,
          text,
          createdAt: serverTimestamp()
        });

        closeModal();
      } catch (error) {
        alert("Komentar gagal dikirim. Coba lagi nanti.");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Kirim Komentar";
      }
    });

    closeCommentModal.addEventListener("click", closeModal);

    commentModal.addEventListener("click", (event) => {
      if (event.target === commentModal) {
        closeModal();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && commentModal.classList.contains("is-open")) {
        closeModal();
      }

      if (event.key === "Escape" && videoSubmitModal.classList.contains("is-open")) {
        closeVideoSubmit();
      }
    });
  </script>
</body>
</html>
