  <script>
    const backgroundMusic = document.getElementById("background-music");
    const musicTimeKey = "unitemevel-music-time";
    const musicStateKey = "unitemevel-music-playing";
    let isLeavingPage = false;

    function playMusic() {
      backgroundMusic.play().catch(() => {});
    }

    backgroundMusic.addEventListener("loadedmetadata", () => {
      const savedTime = Number(localStorage.getItem(musicTimeKey));

      if (savedTime > 0 && savedTime < backgroundMusic.duration) {
        backgroundMusic.currentTime = savedTime;
      }
    });

    backgroundMusic.addEventListener("timeupdate", () => {
      localStorage.setItem(musicTimeKey, backgroundMusic.currentTime);
    });

    backgroundMusic.addEventListener("play", () => {
      localStorage.setItem(musicStateKey, "true");
    });

    backgroundMusic.addEventListener("pause", () => {
      if (!isLeavingPage) {
        localStorage.setItem(musicStateKey, "false");
      }
    });

    window.addEventListener("beforeunload", () => {
      isLeavingPage = true;
      localStorage.setItem(musicTimeKey, backgroundMusic.currentTime);
      localStorage.setItem(musicStateKey, String(!backgroundMusic.paused));
    });

    window.addEventListener("load", () => {
      playMusic();

      if (localStorage.getItem(musicStateKey) === "true") {
        playMusic();
      }
    });

    window.addEventListener("click", playMusic, { once: true });
    window.addEventListener("keydown", playMusic, { once: true });
    window.addEventListener("touchstart", playMusic, { once: true });
  </script>
